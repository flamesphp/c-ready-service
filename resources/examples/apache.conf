# Apache VirtualHost – Flames Ready worker mode
#
# O Apache NÃO serve PHP diretamente. Ele apenas proxeia todas as
# requisições para o socket FastCGI onde os workers estão escutando.
#
# Os workers são iniciados separadamente via CLI:
#   php /var/www/app/worker.php
#
# Fluxo:
#   Browser → Apache → mod_proxy_fcgi → Unix socket → Worker PHP-CLI
#                                                          ↑
#                                              processo de longa duração
#                                              com app já carregada

<VirtualHost *:80>
    ServerName meuapp.local
    DocumentRoot /var/www/app/public

    # Ativar mod_proxy e mod_proxy_fcgi:
    #   a2enmod proxy proxy_fcgi

    # Proxy de TODAS as requisições para o socket do worker
    ProxyPassMatch ^/(.*)$ unix:/var/run/flames-ready/worker.sock|fcgi://localhost/$1

    # Timeout deve ser maior que worker_timeout do php.ini
    ProxyTimeout 120

    ErrorLog  ${APACHE_LOG_DIR}/flames-ready-error.log
    CustomLog ${APACHE_LOG_DIR}/flames-ready-access.log combined
</VirtualHost>

# ── php.ini (ou conf.d/flames-ready.ini) ─────────────────────────────────
#
# [flames_ready]
# flames_ready.socket         = /var/run/flames-ready/worker.sock
# flames_ready.workers        = 4        ; 0 = auto (número de CPUs)
# flames_ready.worker_ttl     = 300      ; segundos antes do worker se renovar
# flames_ready.worker_timeout = 900      ; matar worker travado após N segundos
# flames_ready.max_requests   = 0        ; 0 = ilimitado
